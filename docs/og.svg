    <polyline points="13,40 13,15 26,29 39,15 39,40" fill="none" stroke="#F2ECE0" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="39" cy="13" r="5.5" fill="#C2552F"/>
    <text x="68" y="37" font-size="34" font-weight="600" fill="#211C16">MidOS</text>
  </g>

  <!-- headline -->
