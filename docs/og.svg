      <stop offset="0%" stop-color="#C2552F" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#C2552F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#F2ECE0"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#DCD2C0" stroke-width="2"/>

  <!-- brand lockup -->
